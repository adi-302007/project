<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Timetable Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-body">

  
  <div class="butterfly b1">
    <div class="wing left-wing"></div>
    <div class="wing right-wing"></div>
  </div>
  <div class="butterfly b2">
    <div class="wing left-wing"></div>
    <div class="wing right-wing"></div>
  </div>
  <div class="butterfly b3">
    <div class="wing left-wing"></div>
    <div class="wing right-wing"></div>
  </div>
  <div class="butterfly b4">
    <div class="wing left-wing"></div>
    <div class="wing right-wing"></div>
  </div>

  
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="10" width="36" height="32" rx="4" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M16 6v8M32 6v8M6 22h36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="14" y="28" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.7"/>
          <rect x="21" y="28" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="28" y="28" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.3"/>
        </svg>
      </div>

      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Timetable Management System</p>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="username" class="form-input" placeholder="Enter your username" autocomplete="off"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="off"/>
        </div>
      </div>

      <div class="error-msg" id="errorMsg">Incorrect Password. Please try again.</div>

      <button class="login-btn" onclick="handleLogin()">
        <span>Sign In</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <p class="login-hint">Hint: password is <em>aditya123</em></p>
    </div>
  </div>

  <script>
    function handleLogin() {
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.querySelector('.login-btn');

      if (password === 'aditya123') {
        btn.classList.add('success');
        btn.querySelector('span').textContent = 'Redirecting…';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      } else {
        errorMsg.classList.add('visible');
        document.getElementById('password').classList.add('shake');
        setTimeout(() => {
          document.getElementById('password').classList.remove('shake');
        }, 500);
      }
    }

    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    document.getElementById('password').addEventListener('input', function() {
      document.getElementById('errorMsg').classList.remove('visible');
    });
  </script>
</body>
</html>
